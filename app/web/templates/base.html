<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Teste de Frete{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <a class="brand" href="{{ url_for('index') }}">
            <span class="logo-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4.5 6.5h10.8c1.3 0 2.4 1 2.6 2.3l1.1 8.1c.2 1.7-1.1 3.1-2.8 3.1H7.7c-1.4 0-2.6-1.1-2.8-2.5L3.7 8.6C3.4 7.5 3.8 6.5 4.5 6.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <path d="M8 6.5l1.1-2.1C9.5 3.6 10.2 3 11.1 3h2.7c.9 0 1.7.6 2 1.4l.7 2.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M8.5 12.3h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            Teste de Frete
          </a>
          <div class="subtitle">Painel de coleta e auditoria de frete via Selenium</div>
        </div>
        <div class="header-actions">
          <a class="chip" href="{{ url_for('health') }}" target="_blank" rel="noreferrer">health</a>
        </div>
      </header>

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
